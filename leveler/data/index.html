<!DOCTYPE html>
<html lang=""en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camper Leveler</title>
    <link rel="stylesheet" href = "/style.css" />
</head>
<body>
    <div class="container">
        <h1>Camper Leveler</h1>

        <div class="card">
            <div class="row">
                <span>Pitch</span>
                <span id="pitch">--.--°</span>
            </div>
            <div class="row">
                <span>Roll</span>
                <span id="roll">--.--°</span>
            </div>
            <div class="row">
                <span>Status</span>
                <span id="status">waiting...</span>
            </div>
        </div>

        <div class="action">
            <button id="refreshBtn">Refresh</button>
            <button id="calibrateBtn">Calibrate</button>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
